# Run from this directory:  cd infra && docker compose up
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shipflow
      POSTGRES_PASSWORD: shipflow
      POSTGRES_DB: shipflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shipflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    env_file: ../backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ../backend/data/labels:/srv/backend/data/labels
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    env_file: ../backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend/data/labels:/srv/backend/data/labels
    command: ["arq", "app.workers.WorkerSettings"]

volumes:
  postgres_data:
