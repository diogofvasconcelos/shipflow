{% extends "base.html" %}
{% block title %}Pedidos — ShipFlow{% endblock %}
{% block content %}
<hgroup>
  <h1>Pedidos</h1>
  <p>Pedidos ingeridos do Mercado Livre (webhook + polling).</p>
</hgroup>

<div style="display:flex; gap:1rem; align-items:flex-end; flex-wrap:wrap;">
  <form id="order-filters" hx-get="/orders" hx-target="#orders-table"
        hx-trigger="submit, change, keyup changed delay:400ms from:input[name=q]"
        style="flex:1; min-width:20rem;">
    <div class="grid">
      <label>Status
        <select name="status">
          <option value="">Todos</option>
          {% for value, label in [("paid", "Pago"), ("shipped", "Enviado"), ("cancelled", "Cancelado")] %}
          <option value="{{ value }}" {% if filters.status == value %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </label>
      <label>Conta
        <select name="account_id">
          <option value="">Todas</option>
          {% for account in accounts %}
          <option value="{{ account.id }}" {% if filters.account_id == account.id %}selected{% endif %}>{{ account.nickname }}</option>
          {% endfor %}
        </select>
      </label>
      <label>Buscar
        <input type="search" name="q" value="{{ filters.q or '' }}" placeholder="Pedido ou comprador">
      </label>
    </div>
  </form>
  <button hx-post="/api/orders/sync" hx-swap="none"
          hx-on::after-request="showToast('Sincronização enfileirada')">
    Sincronizar agora
  </button>
</div>

<div id="orders-table">
  {% include "partials/orders_table.html" %}
</div>

<div id="toast" role="status"
     style="position:fixed; bottom:1rem; right:1rem; display:none;"
     class="badge-warn"></div>
<script>
  function showToast(msg) {
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.style.display = "block";
    setTimeout(function () { t.style.display = "none"; }, 3000);
  }
</script>
{% endblock %}
