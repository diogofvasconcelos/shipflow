name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: |
          ruff check .
          ruff format --check .

      - name: Test (coverage gate 80%)
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80

  migrations:
    # Models stay SQLite-compatible for tests; this job catches migrations
    # that only work on SQLite by running them against real PostgreSQL.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: shipflow
          POSTGRES_PASSWORD: shipflow
          POSTGRES_DB: shipflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shipflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://shipflow:shipflow@localhost:5432/shipflow
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Run migrations on PostgreSQL
        run: alembic upgrade head
